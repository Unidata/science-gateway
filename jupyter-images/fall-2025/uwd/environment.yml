name: uwd25f
channels:
 - conda-forge
dependencies:
  # Required by JupyterLab
  - 'python<3.13'
  - nb_conda_kernels
  - ipykernel
  - jupyter-server-proxy
  # User requested packages
  - cartopy
  - graphviz
  - h5netcdf
  - ipywidgets
  - matplotlib
  - metpy
  - netcdf4
  - numpy
  - pandas
  - pip
  - pydap
  - python-awips
  - python-graphviz
  - scikit-learn
  - scipy
  - seaborn
  - siphon
  - xarray
  - pip:
    # It is recommended to install a package using pip as a last resort, i.e.
    # when it is not found in the conda repos
    - dask-kubernetes
